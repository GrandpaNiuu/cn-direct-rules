<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>安装 CN Direct Rules</title>
    <style>
      :root { font-family: system-ui, sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; }
      main { width: min(32rem, calc(100% - 2rem)); text-align: center; }
      .actions { display: grid; gap: .75rem; margin-top: 1.5rem; }
      a { padding: .8rem 1rem; border-radius: .6rem; text-decoration: none; }
      #install { color: white; background: #1677ff; }
      #raw { color: inherit; border: 1px solid currentColor; }
      #status { opacity: .75; }
    </style>
  </head>
  <body>
    <main>
      <h1>正在打开 Shadowrocket</h1>
      <p id="status">若系统询问，请允许打开 App。</p>
      <div class="actions">
        <a id="install" href="#">打开 Shadowrocket</a>
        <a id="raw" href="https://raw.githubusercontent.com/GrandpaNiuu/cn-direct-rules/main/dist/shadowrocket/cn-direct.sgmodule">查看模块原始文件</a>
      </div>
    </main>
    <script>
      const expectedTarget = "shadowrocket://install?module=https://raw.githubusercontent.com/GrandpaNiuu/cn-direct-rules/main/dist/shadowrocket/cn-direct.sgmodule";
      const target = new URLSearchParams(window.location.search).get("url");
      const install = document.getElementById("install");
      const status = document.getElementById("status");

      if (target !== expectedTarget) {
        install.removeAttribute("href");
        install.setAttribute("aria-disabled", "true");
        status.textContent = "安装地址无效；本页面只允许安装官方 CN Direct Rules 模块。";
      } else {
        install.href = target;
        window.setTimeout(() => window.location.replace(target), 150);
      }
    </script>
  </body>
</html>
