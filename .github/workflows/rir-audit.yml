name: RIR audit

on:
  schedule:
    - cron: "30 16 * * *" # 00:30 Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rir-audit
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download delegated statistics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upstream/rir-global/raw
          curl -fsSL --retry 3 --retry-delay 5 \
            https://ftp.apnic.net/stats/apnic/delegated-apnic-extended-latest \
            -o upstream/rir-global/raw/apnic.txt
          curl -fsSL --retry 3 --retry-delay 5 \
            https://ftp.arin.net/pub/stats/arin/delegated-arin-extended-latest \
            -o upstream/rir-global/raw/arin.txt
          curl -fsSL --retry 3 --retry-delay 5 \
            https://ftp.ripe.net/pub/stats/ripencc/delegated-ripencc-extended-latest \
            -o upstream/rir-global/raw/ripencc.txt
          curl -fsSL --retry 3 --retry-delay 5 \
            https://ftp.lacnic.net/pub/stats/lacnic/delegated-lacnic-extended-latest \
            -o upstream/rir-global/raw/lacnic.txt
          curl -fsSL --retry 3 --retry-delay 5 \
            https://ftp.afrinic.net/pub/stats/afrinic/delegated-afrinic-extended-latest \
            -o upstream/rir-global/raw/afrinic.txt

      - name: Build RIR audit outputs
        run: python scripts/rir_global_audit.py

      - name: Test RIR audit parser
        run: python -m unittest tests/test_rir_global_audit.py -v

      - name: Commit changed audit outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            upstream/rir-global/ipv4.txt \
            upstream/rir-global/ipv6.txt \
            upstream/rir-global/asns.txt \
            upstream/rir-global/sources \
            upstream/audit/asn-diff.json \
            upstream/audit/rir-cn-summary.json \
            dist/registry/cn-global-allocated.conf \
            dist/registry/cn-rir-asn.conf \
            dist/rir-audit-manifest.json
          if git diff --cached --quiet; then
            echo "RIR audit outputs are unchanged"
            exit 0
          fi
          git commit -m "Update global RIR CN audit outputs"
          git push
