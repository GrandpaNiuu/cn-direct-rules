name: Incorrect routing report
description: Report an unsafe, malformed, or missing generated rule
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Include the affected client, rule, and observed behavior.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Main branch commit
      description: Paste the commit SHA for the affected `main` snapshot.
      placeholder: cb8776a0ec07dff96d2fdd1c48d8fc4d900e3cc0
    validations:
      required: true
